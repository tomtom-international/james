trigger: none
pr: none

resources:
  containers:
    - container: jdk
      image: openjdk:8

parameters:
  - name: version
    type: string

variables:
  isMasterBranch: $[eq(variables['Build.SourceBranch'], 'refs/heads/master')]
  GRADLE_USER_HOME: $(Pipeline.Workspace)/.gradle
  cache-version: cache-v1

jobs:
  - job: build
    displayName: Release Job
    pool: 'Private Cloud'
    container: jdk
    steps:
      - checkout: self
        clean: true
        persistCredentials: true
      - task: Cache@2
        inputs:
          key: 'gradle | "$(cache-version)" | "$(Agent.OS)" | **/build.gradle'
          restoreKeys: |
            gradle | "$(cache-version)" | "$(Agent.OS)"
            gradle | "$(cache-version)"
          path: $(GRADLE_USER_HOME)
        displayName: Configure gradle caching
      - task: Gradle@2
        inputs:
          options: '--build-cache'
          gradleWrapperFile: 'gradlew'
          gradleOptions: '-Xmx3072m'
          publishJUnitResults: true
          testResultsFiles: '**/TEST-*.xml'
          tasks: 'build'
